body:
  text: 梁雅樂歌十一首皇雅帝德實廣運車書靡不賓執瑁朝群后垂旒御百神八荒重譯至萬國婉來親華蓋拂紫微勾陳繞太一容裔被緹組參差羅䍐畢星回昭以爛天行徐且謐清蹕朝萬㝢端冕臨正陽青絢黃金繶袞衣文繡裳既散華蟲采復流日月光隋書音樂志樂府詩集三詩紀九十五又類聚四十三引賓神一畢陽裳六韻滌雅將脩盛禮其儀孔熾有腯斯牲國門是置不黎不㾞靡愆靡忌呈肌獻體永言昭事俯休皇德仰綏靈志百福具膺嘉祥允洎駿奔伊在慶覃遐嗣隋書音樂志樂府詩集三廣文選十一詩紀九十五牷雅反本興敬復古昭誠禮容宿設祀事孔明華俎待獻崇碑麗牲充哉繭握肅矣簪纓其膋既啟我豆既盈庖丁游刃葛盧驗聲多祉攸集景福來并隋書音樂志樂府詩集三廣文選十一詩紀九十五諴雅懷忽慌瞻浩蕩盡誠潔致虔想出杳冥降無象皇情肅具僚仰人禮盛神途敞僾明靈申敬享感蒼極洞玄象地德溥崑丘峻揚羽翟鼓應朄出尊祗展誠信招海瀆羅嶽鎮惟福祉咸昭晉我有明德馨非稷黍牲玉孔備嘉薦惟旅金懸宿設和樂具舉禮達幽明敬行尊俎鐘鼓云送遐福是與隋書音樂志樂府詩集三廣文選十一詩紀九十五獻雅神宮肅肅天儀穆穆禮獻既同膺茲釐福我有馨明無愧史祝隋志音樂志樂府詩集三詩紀九十五禋雅紫宮昭煥太乙微玄降臨下土尊高上天載陳珪幣式備牲牷雲箛清引栒虡高懸俯昭象物仰致高煙肅彼靈祉咸達皇虔盛樂斯舉協徵調宮靈饗慶洽祉積化融八變有序三獻已終坎牲瘞玉酬德報功振垂成呂投壤生風道無虛致事由感通於皇盛烈比祚華嵩隋書音樂志樂府詩集三文選補遺三十四詩紀九十五梁南郊登歌詩二首梁南郊登歌詩二首暾既明禮告成惟聖祖主上靈爵已獻罍又盈息羽籥展歌聲僾如在結皇情隋書音樂志樂府詩集三詩紀九十五禮容盛尊俎列玄酒陳陶匏設獻清酒致虔潔王既升樂已闋降蒼昊垂芳烈同上梁北郊登歌二首梁北郊登歌二首方壇既塪地祇已出盛典弗諐群望咸秩乃升乃獻敬成禮卒靈降無兆禮饗載謐允矣嘉祚其升如日隋書音樂志樂府詩集三詩紀九十五至哉坤元實惟厚載躬茲奠饗誠交顯晦或升或降搖珠動佩德表成物慶流皇代純嘏不諐祺福是賚同上梁明堂登歌五首青帝帝居在震龍德司春開元布澤含和尚仁群居既散歲云陽止飭農分地民粒惟始雕梁繡栱丹楹玉墀靈威以降百福來綏隋書音樂志樂府詩集三詩紀九十五赤帝赤帝炎光在離火為威德執禮昭訓持衡受則靡草既凋溫風以至嘉薦惟旅時羞孔備齊緹在堂笙鏞在下匪惟七百無絕終始同上黃帝黃帝鬱彼中壇含靈闡化迴環氣象輪無輟駕布德焉在四序將收音宮數五飯稷驂駵宅屏居中旁臨外宇升為帝尊降為神主同上白帝白帝神在秋方帝居西皓允茲金德裁成萬寶鴻來雀化參見火斜幕無玄鳥菊有黃華載列笙磬式陳彝俎靈罔常懷惟德是與同上黑帝黑帝德盛乎水玄冥紀節陰降陽騰氣凝象閟司智蒞坎駕鐵衣玄祈寒拆地晷度迴天悠悠四海駿奔奉職祚我無疆永隆民極同上梁宗廟登歌七首梁宗廟登歌七首功高禮洽德尊樂備三獻具舉百司在位誠敬罔諐幽明同致茫茫億兆無思不遂蓋之如天容之如地隋書音樂志樂府詩集九廣文選十一詩紀九十五殷兆玉筐周始邠王於赫文祖基我大梁肇土七十奄有四方帝軒百祀人思未忘永言聖烈祚我無疆同上有夏多罪殷人塗炭四海倒懸十室思亂自天命我殲凶殄難既躍乃飛言登天漢爰享爰格福祿攸贊同上犧象既飾罍俎斯具我鬱載馨黃流乃注峨峨卿士駿奔是務佩上鳴階纓還拂樹悠悠億兆天臨日煦同上猗與至德光被黔首鑄鎔蒼昊甄陶區有恪恭三獻對揚萬壽比屋可封含生無咎匪徒七百天長地久同上有命自天於皇后帝悠悠四海莫不來祭繁祉具膺八神聳衛福至有兆慶來無際播此餘休于彼荒裔同上祀典昭潔我禮莫違八簋充室六龍解騑神宮肅肅靈寢微微嘉薦既饗景福攸歸至德光被洪祚載輝同上舞歌閟宮肅肅清廟濟濟於穆夫人固天攸啟祚我梁德膺斯盛禮文㮰達嚮重檐丹陛飾我俎彝潔我粢盛躬事奠饗推尊盡敬悠悠萬國具承茲慶大孝追遠兆庶攸詠隋書音樂志樂府詩集九詩紀九十五登歌光流者遠禮貴彌申嘉饗云備盛典必陳追養自本立愛惟親皇情乃慕帝服來尊駕齊六轡旂耀三辰感茲霜露事彼冬春以斯孝德永被烝民同上梁三朝雅樂歌六首俊雅設官分職髦俊攸俟髦俊伊何貴德尚齒唐又咸事周寧多士區區衛國猶賴君子漢之得人帝猷乃理開我八襲闢我九重珩珮流響纓紱有容袞衣前邁列辟雲從義兼東序事美西雍分階等肅異列齊恭重列北上分庭異陛百司揚職九賓相禮齊宋舅甥魯衛兄弟思皇藹藹群龍濟濟我有嘉賓實惟愷悌隋書音樂志樂府詩集十四詩紀九十五胤雅自昔殷代哲王迭有降及周成惟器是守上天乃眷大梁既受灼灼重明仰承元首體乾作貳命服斯九置保置師居前居後前星比耀克隆萬壽隋書音樂志樂府詩集十四又類聚四十三引有守愛首四韻寅雅禮莫違樂具舉延藩辟朝帝所執桓蒲列齊莒垂袞毳紛容與升有儀降有序齊簪紱忘笑語始矜嚴終酣醑隋書音樂志樂府詩集十四詩紀九十五介雅介雅百福四象初萬壽三元始拜獻惟袞職同心協卿士北極永無窮南山何足擬壽隨百禮洽慶與三朝升惟皇集繁祉景福互相仍申錫永無遺穰簡必來應百味既含馨六飲莫能尚玉罍信湛湛金巵頗搖漾敬舉發天和祥祉流嘉貺隋書音樂志樂府詩集十四詩紀九十五又類聚四十三引第一曲需雅實體平心待和味庶羞百品多為貴或鼎或鼒宣九沸楚桂胡鹽芼芳卉加籩列俎彫且蔚五味九變兼六和令芳甘旨庶且多三危之露九期禾圓案方丈粲星羅皇舉斯樂同山河九州上腴非一族玄芝碧樹壽華木終朝采之不盈掬用拂腥膻和九穀既甘且飫致遐福人欲所大味為先興和盡敬咸在旃碧鱗朱尾獻嘉鮮紅毛綠翼墜輕翾臣拜稽首萬斯年擊鐘以俟惟大國況乃御天流至德侑食斯舉揚盛則其禮不諐儀不忒風猷所被深且塞膳夫奉職獻芳滋不麛不夭咸以時調甘適苦別澠淄其德不爽受福釐於焉逸豫永無期備味斯饗惟至聖咸降人神禮為盛或風或雅流歌詠負鼎言歸啟殷命悠悠四海同茲慶道我六穗羅八珍洪鼎自釁匪勞薪荊包海物必來陳滑甘滫味和神以斯至德被無垠隋書音樂志樂府詩集十四詩紀九十五雍雅明明在上其儀有序終事靡諐收鉶撤俎乃升乃降和樂備舉天德莫違人謀是與敬行禮達茲焉讌語我餕惟阜我肴孔庶嘉味既充食旨斯飫屬厭無爽沖和在御擊壤齊歡懷生等豫烝庶乃粒實由仁恕百司警列三皇在陛既飫且醑卒食成禮其容穆穆其儀濟濟凡百庶僚莫不愷悌奄有萬國抑由天啟隋書音樂志樂府詩集十四詩紀九十五五音曲五首角引萌生觸發歲在春咸池始奏德尚仁惉懘以息和且均隋書音樂志樂府詩集二十六詩紀九十五徵引執衡司事宅離方滔滔夏日火德昌八音備舉樂無疆同上宮引八音資始君五聲興此和樂感百精優游律呂被咸英同上商引司秋紀兌奏西音激揚鍾石和瑟琴風流福被樂愔愔同上羽引玄英紀運冬冰折物為音本和且悅窮高測深長無絕同上木紀謝木紀謝火運昌炳南陸耀炎光民去癸鼎歸梁鮫魚出慶雲翔韊五帝軼三王德無外化溥將仁蕩蕩義湯湯浸金石達昊蒼橫四海被八荒舞干戚垂衣裳對天眷坐巖廊胤有錫祚無疆風教遠禮容盛感人神宣舞詠降繁祉延嘉慶樂府詩集二十詩紀九十五又類聚四十二引昌梁王荒四韻廣文選十二引昌梁翔將湯蒼荒裳廊疆盛詠慶十三韻賢首山賢首山險而峻乘峴憑臨胡陣騁奇謀奮卒徒斷白馬塞飛狐殪日逐殲骨都刃谷蠡馘林胡草既潤原亦塗輪無反幕有烏掃殘孽震戎逋揚凱奏展歡酺詠枤杜旋京吳樂府詩集二十廣文選十二詩紀九十六又類聚四十二引峻陣徒狐四韻桐柏山桐柏山淮之首肇基帝迹遂光區有震邊關殪獯醜農既勸民惟阜穗充庭稼盈畝迨嘉辰𧲛芳糗納寒場為春酒昭景福介眉壽天斯長地斯久化無極功無朽樂府詩集二十廣文選十二詩紀九十五又類聚四十二引首有醜阜四韻道亡道亡數極歸永元悠悠兆庶盡含冤沈河莫極皆無安赴海誰授矯龍翰自樊漢仙波流水清且瀾救此倒懸拯塗炭誓師劉旅赫靈斷率茲八百驅十亂登我聖明去多難長夜杳冥忽云旦樂府詩集二十詩紀九十五又類聚四十二引元冤漢亂難五韻忱威忱威忱威授律命蒼兕言薄加湖灌秋水迴瀾瀄汩汎增雉爭河投岸掬盈指犯刃嬰戈洞流矢資此威烈齊文軌樂府詩集二十詩紀九十五又類聚四十二引光水軌三韻漢東流漢東流江之汭逆徒蜂聚旌旗紛蔽仰震威靈乘高騁銳至仁解網窮鳥入懷因此龍躍言登泰階類聚四十二樂府詩集二十廣文選十二詩紀九十五鶴樓峻鶴樓峻連翠微因巖設險池永歸脣亡齒懼薄言震耀靈威凶眾稽顙天不能違金湯無所用功烈長巍巍樂府詩集二十詩紀九十五又類聚四十二引微威微三韻昏主恣淫慝昏主恣淫慝皆曰自昌盛上仁矜億兆誓師為請命既齊丹浦戰又符甲子辰龕難伐有罪伐罪弔斯民悠悠億萬姓於此覩陽春樂府詩集二十詩紀九十五又類聚四十二引盛命辰春四韻石首局石首局石首局北墉墐新堞嚴東壘峻共表裏遙相鎮矢未飛鼓方振競銜璧並輿櫬酒池擾象廊震同伐謀兼善陳闢應和掃煨燼剪庶惡靡餘胤樂府詩集二十詩紀九十五又類聚四十二引墐峻振櫬胤五韻期運集期運集惟皇膺寶符龍躍清漢渚鳳起方城隅謳歌共適夏獄訟兩違朱二儀啟嘉祚千載猶旦暮舞蹈流帝功金玉昭王度類聚四十二樂府詩集二十詩紀九十五於穆於穆君臣君臣和以肅關王道定天保樂均靈囿宴同在鎬前庭懸鼓鐘左右列笙鏞纓佩俯仰有則脩禮容翔振鷺騁群龍隆周何足擬遠與唐比蹤樂府詩集二十詩紀九十五又類聚四十二引肅保鎬鏞容五韻惟大梁惟大梁開運受籙膺圖君八極冠帶被五都四海並和會排闕款塞無異塗樂府詩集二十詩紀九十五又類聚四十二引圖都二韻日出東南隅行以下五言朝日出邯鄲照我叢臺端中有傾城豔顧景織羅紈延軀似纖約遺視若回瀾瑤裝映層綺金服炫彫欒幸有同匡好西仕服秦官寶劍垂玉貝汗馬飾金鞍縈場類轉雪逸控寫騰鸞羅衣夕解帶玉釵暮垂冠文苑英華百九十三樂府詩集二十八廣文選十詩紀七十二又類聚四十一引端紈官鞍鸞冠六韻昭君辭朝發披香殿夕濟汾陰河於茲懷九逝自此斂雙蛾沾妝疑湛露繞臆狀流波日見奔沙起稍覺轉蓬多胡風犯肌骨非直傷綺羅銜涕試南望關山鬱嵯峨始作陽春曲終成苦寒歌惟有三五夜明月暫經過玉臺新詠箋注五類聚四十二文苑英華二百四樂府詩集二十九詩紀七十二長歌行連連舟壑改微微市朝變來功嗣往迹莫武徂升彥局塗頓遠策留懽恨奔箭拊戚狀驚瀾循休擬回電歲去芳願違年來苦心薦春貌既移紅秋林豈停蒨一倍茂陵道寧思柏梁宴長戢兔園情永別金華殿聲徽無惑簡丹青有餘絢幽籥且未調無使長歌倦樂府詩集三十廣文選十四詩紀七十二又四十二引變箭宴殿五韻同前同前春隰荑綠柳寒墀積皓雪依依往紀盈霏霏來思結思結纏歲晏曾是掩初節初節曾不掩浮榮逐弦缺弦缺更圓合浮榮永沈滅色隨夏蓮變態與秋霜耋道迫無異期賢愚有同絕銜恨豈云忘天道無甄別功