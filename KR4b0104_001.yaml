冬春而哀樂愍海上之驚鳧傷雲間之離鶴離鶴昔未離近發天北陲忽值疾風起暫下昆明池復值冬冰合水宿非所宜欲留不可住欲去飛已疲勢逐疾風舉求溫向衡楚復值南飛鴻參差共成侶海上多雲霧蒼茫失洲嶼自此別故群獨向瀟湘渚故群不離散相依滄海畔夜止羽相切晝飛影相亂刷羽共浮沉湛澹泛清潯既不經離別安知慕侶心九冬霜雪苦六翮飛不任且養凌雲翅俯仰弄清音所望浮邱子旦夕來見尋玉臺新詠箋注九詩紀七十四又類聚九十引池儀薄爵鶴離垂池疲舉楚侶嶼渚散畔亂沉陰心任音二十二韻晨征聽曉鴻晨征聽曉鴻聽曉鴻曉鴻度將旦跨弱水之微瀾發成山之遠岸怵春歸之未幾驚此歲之云半出海漲之蒼茫入雲途之渺漫無東西之可辨孰遐邇之能算微昔見于洲渚赴秋期于江漢集勁風於弱軀負重雪于輕翰寒谿可以飲荒皋可以竄谿水徒自清微容豈足玩秋蓬飛兮未極塞草萎兮無色楚山高兮杳難度越水深兮不可測美明月之馳光顧征禽之騁翼伊余馬之屢懷知吾行之未極夜緜緜而難曉愁參差而盈臆望山川悉無似惟星河猶可識聞雁夜南飛客淚夜沾衣春鴻旦暮返客子方未歸歲去歡娛盡年來容貌非攬衽形雖似撫臆事多違青緺雖長復易解白雲誠遠詎難依玉臺新詠箋注九詩紀七十四又類聚九十引旦岸算極色測翼臆飛衣歸十一韻解佩去朝市解佩去朝市去朝市朝市深歸暮辭北纓而南徂浮東川而西顧逢天地之降祥值日月之重光伊當仁之菲薄非余情之信芳充待詔于金馬奉高宴于柏梁觀鬭獸於虎圈望窅窕于披香遊西園兮登銅雀舉青瑣兮眺重陽講金華兮議宣室晝武帷兮夕文昌佩甘泉兮履五柞簪枍詣兮紱承光託後車兮侍華幄遊渤海兮泛清漳天道有盈缺寒暑遞炎涼一朝賣玉椀眷眷惜餘香曲池無復處桂枝亦銷亡清廟徒肅肅西陵久茫茫薄暮余多幸嘉運重來昌忝稽郡之南尉典千里之光貴別北芒于濁河戀橫橋于清渭望前軒之早桐對南階之初卉非余情之屢傷寄茲焉兮能慰眷昔日兮懷哉日將暮兮歸去來玉臺新詠箋注九詩紀七十四被褐守山東被褐守山東守山東山東萬嶺鬱青葱兩溪共一寫水潔望如空岸側青莎被巖間丹桂叢上瞻既隱軫下睇亦溟濛遠林響咆獸近樹聆鳴蟲路帶若谿右泉吐金華東萬仞倒危石百丈注懸灇掣曳瀉流電奔飛似白虹洞井含清氣漏穴吐飛風玉竇膏滴瀝石乳室空籠峭崿途彌險崖岨步纔通余捨平生之所愛欻暮年而逢此願一去而不還恨鄒衣之未褫揖林壑之清曠事氓俗之紛詭幸帝德之方升值天綱之未毀既除舊而布新故化民而俗徙播趙俗以南徂扇齊風以東靡乳雉方可馴流蝗庶能弭清心矯世濁儉政革民侈秩滿歸白雲淹留事芝髓玉臺新詠箋注九詩紀七十四又類聚三十六引東蔥空叢濛蟲東潀虹風籠逢禘髓十四韻文苑英華百六十引東蔥空叢濛蟲東淙虹風籠逢褫髓十四韻
