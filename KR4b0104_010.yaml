body:
  text: 梁大壯大觀舞歌二首大壯舞歌高高在上實愛斯人眷求聖德大拯彝倫率土方燎如火在薪惵惵黔首暮不及晨朱光啓耀兆發穹旻我皇鬱起龍躍漢津言屆牧野電激雷震闕鞏之甲彭濮之人或貔或武漂杵浮輪我邦雖舊其命維新六伐乃止七德必陳君臨萬國遂撫八夤隋書音樂志樂府詩集五十二詩紀九十七大觀舞歌皇矣帝烈大哉興聖奄有四方受天明命居上不怠臨下惟敬舉無愆則動無失正物從其本人遂其性昭播九功肅齊八柄寬以惠下德以為政三趾晨儀重輪夕映棧壑忘阻梯山匪敻如日有恆與天無竟載陳金石式流舞詠咸英韶夏於茲比盛同上明之君六首大梁七百始天監三元初聖功澄宇縣帝德總車書熙熙億兆臣其志皆歡愈樂府詩集五十四詩紀九十七刑措甫自今隆平亦肇茲神武超楚漢安用道邠岐百拜奄來宅執玉咸在斯象天則地體無為同上禮緝民用擾樂諧風自移舜琴終已絶堯衣今復垂象天則地體無為同上治兵戰六獸為邦命九官靈蛇及瑞羽分素復銜丹望就踰軒頊鏗鏘掩咸濩九尾擾成群八象鳴相顧象天則地化雲布同上有為臣所執司契君之道運行乃四時無言信蒼昊宸居體沖寂忘懷定天保同上至德同自然裁成侔玄造珍祥委天貺靈物開地寶窈窕降青琴參差秀朱草同上團扇歌二首青青林中竹可作白團扇動搖玉郎手因風訪方便合璧事類外集六十團扇復團扇持許自障面憔悴無復理羞與郎相見同上登北固樓詩六代舊山川興亡幾百年繁華今寂寞朝市昔喧闐夜月琉璃水春風柳色天傷時為懷古垂淚國門館輿地紀勝七詠竹火籠詩結根終南下防露復披雲雖為九華扇聊可滌炎氛安能偶狐白鶴卯織成文覆持鴛鴦被百和吐氛氳忽為織手用歲暮待羅裙謝宣城詩集五文選補遺三十六詠竹詩詠竹詩無人賞高節徒自抱貞心合璧事類別集五十四詩四節逝不處繁華難久鮮海録碎事二
